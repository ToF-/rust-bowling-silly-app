{% extends "layout/base.html" %}
{% block main %}
<form method="post" action="/change">
    <div class="score">
        <button type="submit" name="card_button" value="1">1</button>
        <button type="submit" name="card_button" value="2">2</button>
        <button type="submit" name="card_button" value="3">3</button>
        <button type="submit" name="card_button" value="4">4</button>
        <button type="submit" name="card_button" value="5">5</button>
        <button type="submit" name="card_button" value="6">6</button>
        <button type="submit" name="card_button" value="7">7</button>
        <button type="submit" name="card_button" value="8">8</button>
        <button type="submit" name="card_button" value="9">9</button>
        <button type="submit" name="card_button" value="0">0</button>
        <button type="submit" name="card_button" value="/">/</button>
        <button type="submit" name="card_button" value="X">X</button>

{% endblock %}
